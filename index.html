<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAGE BALANCE - FIXED</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }

        /* UI Screens */
        .ui-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; background: rgba(0, 0, 0, 0.9); text-align: center; }
        .container { padding: 25px; border: 2px solid #ff0055; border-radius: 15px; background: #0a0000; width: 85%; max-width: 400px; box-shadow: 0 0 20px #ff005555; }
        
        button { padding: 12px 25px; margin: 10px; font-size: 18px; font-weight: bold; background: transparent; color: #ff0055; border: 2px solid #ff0055; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #ff0055; color: #000; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; }
        
        input { padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ff0055; background: #000; color: #fff; width: 80%; text-align: center; font-size: 16px; }

        #hud { position: fixed; top: 15px; width: 100%; text-align: center; font-size: 32px; font-weight: bold; color: #00ffff; z-index: 50; display: none; pointer-events: none; }
        #diff-tag { position: fixed; top: 55px; width: 100%; text-align: center; font-size: 16px; z-index: 50; font-weight: bold; pointer-events: none; }

        #countdown { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; z-index: 60; display: none; text-shadow: 0 0 20px #fff; pointer-events: none; }
        
        ol { text-align: left; padding: 0; list-style: none; margin: 15px 0; max-height: 180px; overflow-y: auto; background: rgba(255,255,255,0.05); border-radius: 8px; }
        li { padding: 8px 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 14px; }
        .rank-num { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">0.0s</div>
<div id="diff-tag"></div>
<div id="countdown">2</div>

<!-- START MENU -->
<div id="menu" class="ui-screen">
    <div class="container">
        <h1 style="color: #ff0055; margin: 0;">RAGE BALANCE</h1>
        <p style="font-size: 14px; color: #888;">Chạm 2 bên màn hình để giữ thăng bằng!</p>
        <button onclick="startGame()">VÀO TRẬN</button>
        <div style="margin-top: 15px;">
            <strong style="color: #ffd700;">🏆 BẢNG XẾP HẠNG</strong>
            <ol id="leaderboardList"><li>Đang tải...</li></ol>
        </div>
    </div>
</div>

<!-- GAME OVER -->
<div id="gameOverUI" class="ui-screen" style="display:none">
    <div class="container">
        <h2 style="color: #ff0055;">KẾT THÚC!</h2>
        <p style="font-size: 24px;"><span id="finalTime" style="color: #00ffff;">0</span> giây</p>
        <input type="text" id="playerName" placeholder="Nhập tên..." maxlength="10">
        <button id="btnSave" onclick="saveScore()">💾 LƯU ĐIỂM</button>
        <button onclick="backToMenu()">🏠 VỀ MENU</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDini_60OLbZvd-AOJOCOvmtjRV5pPe_p8",
        authDomain: "cwdlksite.firebaseapp.com",
        projectId: "cwdlksite",
        databaseURL: "https://cwdlksite-default-rtdb.firebaseio.com",
        storageBucket: "cwdlksite.firebasestorage.app",
        messagingSenderId: "77848012913",
        appId: "1:77848012913:web:2fd560297deedaec2a13d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");
    const diffTag = document.getElementById("diff-tag");
    const countdownUI = document.getElementById("countdown");

    let angle, speed, time, isGameOver = true, isPreparing = false;
    let controlForce = 0, barWidth = 280, shake = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Hệ thống nhấn nhạy (Pointerdown dùng cho cả chuột và touch)
    window.addEventListener('pointerdown', (e) => {
        if (isGameOver || isPreparing) return;
        // Bỏ qua nếu nhấn trúng UI
        if (e.target.closest('.container')) return;

        const touchX = e.clientX;
        if (touchX < window.innerWidth / 2) {
            applyPush(-1);
        } else {
            applyPush(1);
        }
    });

    document.onkeydown = (e) => {
        if (e.key === "ArrowLeft") applyPush(-1);
        if (e.key === "ArrowRight") applyPush(1);
    };

    function applyPush(dir) {
        // Lực hích nhỏ để thanh nghiêng từ từ theo từng cú tap
        controlForce += (dir * 0.0065); 
    }

    window.startGame = () => {
        hideScreens();
        hud.style.display = "block";
        countdownUI.style.display = "block";
        
        angle = 0; speed = 0; time = 0; controlForce = 0;
        isGameOver = false; isPreparing = true; barWidth = 280;
        
        let waitTime = 2; // CHUẨN BỊ 2 GIÂY
        countdownUI.innerText = waitTime;
        let timer = setInterval(() => {
            waitTime--;
            if(waitTime <= 0) {
                countdownUI.innerText = "GO!";
                setTimeout(() => { countdownUI.style.display = "none"; isPreparing = false; }, 500);
                clearInterval(timer);
            } else { countdownUI.innerText = waitTime; }
        }, 1000);
        gameLoop();
    };

    window.backToMenu = () => {
        isGameOver = true;
        hideScreens();
        document.getElementById("menu").style.display = "flex";
    };

    function hideScreens() {
        document.querySelectorAll('.ui-screen').forEach(s => s.style.display = 'none');
    }

    function update() {
        if (isGameOver || isPreparing) return;

        let gravity = 0.008 + (time * 0.0004);
        speed += Math.sin(angle) * gravity; 
        
        speed += controlForce;
        controlForce *= 0.8; // Giảm lực nhanh để cảm giác spam mượt hơn
        
        if (time < 5) {
            diffTag.innerText = "MỨC ĐỘ: DỄ"; diffTag.style.color = "#00ff00";
        } else if (time < 12) {
            diffTag.innerText = "MỨC ĐỘ: KHÓ (GIÓ)"; diffTag.style.color = "#ffff00";
            speed += (Math.random() - 0.5) * 0.004;
        } else {
            diffTag.innerText = "MỨC ĐỘ: ÁC MỘNG"; diffTag.style.color = "#ff0000";
            shake = Math.random() * 5;
            if(barWidth > 120) barWidth -= 0.1;
        }

        speed *= 0.98;
        angle += speed;
        time += 1/60;
        hud.innerText = time.toFixed(1) + "s";

        if (Math.abs(angle) > 1.3) endGame();
    }

    function draw() {
        ctx.save();
        if (shake > 0) { ctx.translate(Math.random()*shake, Math.random()*shake); shake *= 0.9; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#050000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2, cy = canvas.height / 2 + 80;

        ctx.strokeStyle = "#220000"; ctx.lineWidth = 15; ctx.beginPath();
        ctx.moveTo(cx, cy); ctx.lineTo(cx, canvas.height); ctx.stroke();

        ctx.translate(cx, cy); ctx.rotate(angle);
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055"; ctx.fillStyle = "#fff";
        ctx.fillRect(-barWidth/2, -5, barWidth, 10);

        ctx.shadowColor = "#00ffff"; ctx.fillStyle = "#00ffff";
        ctx.fillRect(-22, -47, 44, 44);
        ctx.restore();
    }

    function endGame() {
        isGameOver = true;
        document.getElementById("gameOverUI").style.display = "flex";
        document.getElementById("finalTime").innerText = time.toFixed(1);
        document.getElementById("btnSave").disabled = false;
        document.getElementById("btnSave").innerText = "💾 LƯU ĐIỂM";
    }

    function gameLoop() { if (!isGameOver) { update(); draw(); requestAnimationFrame(gameLoop); } }

    // XỬ LÝ LƯU ĐIỂM VÀ VỀ MENU
    window.saveScore = async () => {
        const nameInput = document.getElementById("playerName");
        const name = nameInput.value.trim() || "Ẩn danh";
        const finalS = Number(time.toFixed(1));
        const btn = document.getElementById("btnSave");
        
        btn.disabled = true;
        btn.innerText = "ĐANG LƯU...";
        
        try {
            await push(ref(db, "leaderboard"), { name, score: finalS, date: Date.now() });
            nameInput.value = ""; // Reset tên
            backToMenu(); // Lưu xong quay về Menu chính
        } catch (e) { 
            alert("Lỗi khi lưu!"); 
            btn.disabled = false;
            btn.innerText = "💾 LƯU LẠI";
        }
    };

    // Cập nhật BXH thời gian thực
    onValue(ref(db, "leaderboard"), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;
        const list = Object.values(data).sort((a, b) => b.score - a.score).slice(0, 10);
        document.getElementById("leaderboardList").innerHTML = list.map((item, i) => `
            <li>
                <span><span class="rank-num">#${i+1}</span> ${item.name}</span>
                <span style="color:#00ffff">${item.score}s</span>
            </li>
        `).join('');
    });
</script>
</body>
</html>
