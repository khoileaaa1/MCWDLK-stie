<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Eryk Pro Max</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        body{overflow:hidden;background:#000; touch-action: none;}

        body::before{
            content:""; position:fixed; inset:0; z-index:-1;
            background: radial-gradient(circle at 20% 20%, #38bdf822, transparent 35%),
                        radial-gradient(circle at 80% 40%, #22c55e22, transparent 35%),
                        radial-gradient(circle at 50% 80%, #3b82f622, transparent 35%),
                        linear-gradient(135deg,#000,#020617,#000);
            animation:bgmove 8s infinite alternate;
        }
        @keyframes bgmove{ from{transform:scale(1)} to{transform:scale(1.15)} }

        canvas{position:fixed; inset:0; z-index:1; touch-action: none;}

        .login, .menu, .over, .top {
            position:fixed; inset:0; z-index:999; display:none; 
            justify-content:center; align-items:center;
        }
        .box, .menu-box {
            width:90%; max-width:360px; padding:25px;
            border-radius:20px; background:rgba(0,0,0,0.8);
            border:1px solid #38bdf8; backdrop-filter:blur(15px);
            text-align:center; color:white;
        }

        button{
            width:100%; padding:12px; margin-top:10px;
            border:none; border-radius:12px;
            background:linear-gradient(90deg,#38bdf8,#22c55e);
            color:black; font-weight:bold; cursor:pointer;
        }
        button:active{ transform:scale(0.95); }

        #hud{
            position:fixed; top:10px; left:10px; z-index:10;
            color:#00ff88; padding:8px 12px; border-radius:10px;
            background:rgba(0,0,0,0.5); border:1px solid #38bdf8;
            font-size:18px;
        }

        /* D-PAD Ở GIỮA GÓC DƯỚI */
        #controls {
            display: none;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            width: 240px;
            height: 240px;
        }
        .dpad {
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
        }
        .dpad button {
            background: rgba(255,255,255,0.18);
            border: 4px solid #38bdf8;
            border-radius: 18px;
            color: white;
            font-size: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(56,189,248,0.5);
        }
        .dpad button:active {
            transform: scale(0.82);
            background: rgba(56,189,248,0.55);
        }

        /* Leaderboard & Contact */
        #list { max-height: 420px; overflow-y: auto; margin: 15px 0; padding-right: 8px; }
        #list div {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 18px; margin: 10px 0; background: rgba(255,255,255,0.09);
            border-radius: 14px; border: 1px solid rgba(56,189,248,0.25);
            font-size: 16px; gap: 12px; min-height: 58px;
        }
        #list div span:first-child { color: #38bdf8; font-weight: bold; min-width: 32px; }
        #list div span:nth-child(2) { flex: 1; text-align: left; }
        #list div span:nth-child(3) { color: #00ff88; font-weight: bold; min-width: 55px; text-align: right; }
        #list div span:last-child { font-size: 13px; opacity: 0.8; min-width: 75px; text-align: right; }

        .contact-header { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="hud">Score: 0</div>

    <!-- LOGIN -->
    <div class="login" id="login" style="display:flex">
        <div class="box">
            <h2>GAME SNAKE ERYK</h2>
            <input id="user" placeholder="Tên tài khoản">
            <button onclick="login()">Vào game</button>
        </div>
    </div>

    <!-- MENU -->
    <div class="menu" id="menu">
        <div class="menu-box">
            <h1>🐍 Snake Eryk</h1>
            <p>Pro Max Edition</p>
            <button onclick="start()">▶ Bắt đầu</button>
            <button onclick="openTop()">🏆 Bảng xếp hạng</button>
            <button onclick="openContact()">📱 Contact</button>
        </div>
    </div>

    <canvas id="c"></canvas>

    <!-- GAME OVER -->
    <div class="over" id="over">
        <div class="menu-box">
            <h1>GAME OVER</h1>
            <p id="scoreText"></p>
            <button onclick="restart()">🔄 Chơi lại</button>
            <button onclick="backMenu()">🏠 Menu</button>
        </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="top" id="top">
        <div class="menu-box">
            <h2>🏆 Bảng Xếp Hạng</h2>
            <div id="list"></div>
            <button onclick="closeTop()">Đóng</button>
        </div>
    </div>

    <!-- CONTACT -->
    <div class="top" id="contact">
        <div class="menu-box">
            <div class="contact-header">📱 Contact</div>
            <div style="display:flex;flex-direction:column;gap:12px">
                <a href="https://x.com/Erykle1blp" target="_blank" style="padding:14px;background:rgba(255,255,255,0.08);border-radius:12px;text-decoration:none;color:white;border:1px solid #38bdf8">🐦 Twitter / X</a>
                <a href="https://www.facebook.com/anggkhoi.806438?locale=vi_VN" target="_blank" style="padding:14px;background:rgba(255,255,255,0.08);border-radius:12px;text-decoration:none;color:white;border:1px solid #38bdf8">📘 Facebook</a>
                <a href="https://www.tiktok.com/@anggkhoi" target="_blank" style="padding:14px;background:rgba(255,255,255,0.08);border-radius:12px;text-decoration:none;color:white;border:1px solid #38bdf8">🎵 TikTok</a>
            </div>
            <button onclick="closeContact()" style="margin-top:20px;background:linear-gradient(90deg,#22c55e,#38bdf8)">Đóng</button>
        </div>
    </div>

    <!-- D-PAD -->
    <div id="controls">
        <div class="dpad">
            <div></div>
            <button onclick="moveUp()">↑</button>
            <div></div>
            
            <button onclick="moveLeft()">←</button>
            <div></div>
            <button onclick="moveRight()">→</button>
            
            <div></div>
            <button onclick="moveDown()">↓</button>
            <div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast, orderByChild } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADmCQlryrBmQIuzQopZ5LCURO7RaguyuM",
            databaseURL: "https://mcwdlk-default-rtdb.firebaseio.com",
            projectId: "mcwdlk"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let player = "", score = 0, dir, loop, c, ctx, snake, food, multiplier = 1;
        let multiplierTimer = null;
        let multiplierFood = null;
        let redEatenCount = 0;

        window.login = function(){
            player = document.getElementById("user").value || "Guest";
            document.getElementById("login").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        };

        window.start = function(){
            document.getElementById("menu").style.display = "none";
            document.getElementById("c").style.display = "block";
            init();
        };

        window.backMenu = function(){
            clearInterval(loop);
            if(multiplierTimer) clearTimeout(multiplierTimer);
            document.getElementById("over").style.display = "none";
            document.getElementById("c").style.display = "none";
            document.getElementById("controls").style.display = "none";
            document.getElementById("menu").style.display = "flex";
        };

        window.openContact = () => document.getElementById("contact").style.display = "flex";
        window.closeContact = () => document.getElementById("contact").style.display = "none";

        window.openTop = function(){
            document.getElementById("top").style.display = "flex";
            const q = query(ref(db, "scores"), orderByChild("score"), limitToLast(20));
            onValue(q, (snap) => {
                let data = [];
                snap.forEach(child => data.push(child.val()));
                data.sort((a, b) => b.score - a.score);
                let html = '';
                data.forEach((d, i) => {
                    const timeStr = new Date(d.time).toLocaleString('vi-VN', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    html += `<div><span>#${i+1}</span><span>${d.user}</span><span>${d.score}</span><span>${timeStr}</span></div>`;
                });
                document.getElementById("list").innerHTML = html || "<p style='text-align:center;padding:40px;opacity:0.6'>Chưa có điểm nào</p>";
            });
        };
        window.closeTop = () => document.getElementById("top").style.display = "none";

        window.moveUp = () => { if(dir && dir.y !== 1) dir = {x:0, y:-1}; };
        window.moveDown = () => { if(dir && dir.y !== -1) dir = {x:0, y:1}; };
        window.moveLeft = () => { if(dir && dir.x !== 1) dir = {x:-1, y:0}; };
        window.moveRight = () => { if(dir && dir.x !== -1) dir = {x:1, y:0}; };

        function resize(){
            c = document.getElementById("c");
            c.width = innerWidth;
            c.height = innerHeight;
        }

        function init(){
            resize();
            ctx = c.getContext("2d");
            snake = [{x:10,y:10}];
            dir = {x:1,y:0};
            score = 0;
            multiplier = 1;
            redEatenCount = 0;
            food = randomSafeFood();
            multiplierFood = null;

            document.onkeydown = (e) => {
                if(e.key === "ArrowUp" && dir.y !== 1) dir = {x:0,y:-1};
                if(e.key === "ArrowDown" && dir.y !== -1) dir = {x:0,y:1};
                if(e.key === "ArrowLeft" && dir.x !== 1) dir = {x:-1,y:0};
                if(e.key === "ArrowRight" && dir.x !== -1) dir = {x:1,y:0};
            };

            document.getElementById("controls").style.display = "block";
            loop = setInterval(draw, 120);
        }

        // Hàm tạo thức ăn ĐỎ tránh vùng nút điều khiển
        function randomSafeFood(){
            let maxX = Math.floor(c.width / 20);
            let maxY = Math.floor(c.height / 20);

            let x, y;
            do {
                x = Math.floor(Math.random() * maxX);
                y = Math.floor(Math.random() * maxY);
            } while (isInControlArea(x, y));   // tránh vùng D-Pad

            return {x, y};
        }

        // Kiểm tra xem vị trí có nằm trong vùng D-Pad không
        function isInControlArea(x, y){
            const gridX = Math.floor(c.width / 20);
            const gridY = Math.floor(c.height / 20);

            // Vùng D-Pad chiếm khoảng 12 ô ngang và 12 ô dọc ở dưới giữa
            const controlGridLeft = Math.floor(gridX / 2) - 6;
            const controlGridRight = Math.floor(gridX / 2) + 6;
            const controlGridBottom = gridY - 13;   // cách đáy khoảng 13 ô

            return (x >= controlGridLeft && x <= controlGridRight && y >= controlGridBottom);
        }

        function spawnMultiplierFood(){
            if (multiplierFood) return;
            multiplierFood = {
                x: Math.floor(Math.random() * (c.width/20)),
                y: Math.floor(Math.random() * (c.height/20))
            };
        }

        function draw(){
            document.getElementById("hud").innerText = `Score: ${score} ${multiplier > 1 ? '(x2)' : ''}`;

            let maxX = Math.floor(c.width / 20);
            let maxY = Math.floor(c.height / 20);
            let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

            if(head.x < 0 || head.y < 0 || head.x >= maxX || head.y >= maxY) return end();
            for(let s of snake) if(s.x === head.x && s.y === head.y) return end();

            snake.unshift(head);

            if(head.x === food.x && head.y === food.y){
                score += 10 * multiplier;
                redEatenCount++;
                food = randomSafeFood();        // dùng hàm tránh vùng nút

                if(redEatenCount >= 5 && !multiplierFood){
                    spawnMultiplierFood();
                    redEatenCount = 0;
                }
            } else {
                snake.pop();
            }

            if(multiplierFood && head.x === multiplierFood.x && head.y === multiplierFood.y){
                multiplier = 2;
                if(multiplierTimer) clearTimeout(multiplierTimer);
                multiplierTimer = setTimeout(() => {
                    multiplier = 1;
                    multiplierFood = null;
                }, 3000);
                multiplierFood = null;
            }

            ctx.fillStyle = "#000";
            ctx.fillRect(0,0,c.width,c.height);
            ctx.strokeStyle = "#38bdf8";
            ctx.strokeRect(0,0,c.width,c.height);

            ctx.fillStyle = "red";
            ctx.fillRect(food.x*20, food.y*20, 20, 20);

            if(multiplierFood){
                ctx.fillStyle = "#facc15";
                ctx.beginPath();
                ctx.arc(multiplierFood.x*20 + 10, multiplierFood.y*20 + 10, 10, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.fillStyle = "lime";
            snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 20, 20));
        }

        function end(){
            clearInterval(loop);
            if(multiplierTimer) clearTimeout(multiplierTimer);
            document.getElementById("c").style.display = "none";
            document.getElementById("controls").style.display = "none";
            document.getElementById("over").style.display = "flex";
            document.getElementById("scoreText").innerText = "Score: " + score;

            push(ref(db, "scores"), { user: player, score: score, time: Date.now() });
        }

        window.restart = function(){
            document.getElementById("over").style.display = "none";
            document.getElementById("c").style.display = "block";
            init();
        };
    </script>
</body>
</html>
