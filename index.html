<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Eryk Pro Max</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{overflow:hidden;background:#000}

/* ===== BACKGROUND XỊN ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #38bdf822, transparent 35%),
    radial-gradient(circle at 80% 40%, #22c55e22, transparent 35%),
    radial-gradient(circle at 50% 80%, #3b82f622, transparent 35%),
    linear-gradient(135deg,#000,#020617,#000);
  animation:bgmove 8s infinite alternate;
  z-index:-1;
}

@keyframes bgmove{
  from{transform:scale(1)}
  to{transform:scale(1.15)}
}

canvas{position:fixed;inset:0;z-index:0}

/* ===== LOGIN ===== */
.login{
  position:fixed;inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.box{
  width:90%;max-width:360px;
  padding:25px;
  border-radius:20px;

  background:rgba(0,0,0,0.6);
  border:1px solid #38bdf8;
  backdrop-filter:blur(12px);
  text-align:center;
  color:white;
}

/* ===== MENU ===== */
.menu{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0f172a,#000);
}

.menu-box{
  width:90%;
  max-width:360px;
  padding:25px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(56,189,248,0.4);
  backdrop-filter:blur(15px);

  text-align:center;
  color:white;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;

  background:linear-gradient(90deg,#38bdf8,#22c55e);
  color:black;
  font-weight:bold;
  cursor:pointer;

  transition:0.2s;
  box-shadow:0 0 10px rgba(56,189,248,0.3);
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(56,189,248,0.6);
}

button:active{
  transform:scale(0.95);
}

/* ===== HUD ===== */
#hud{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  color:#00ff88;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  border:1px solid #38bdf8;
}

/* ===== OVER + TOP ===== */
.over,.top{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  padding:20px;
  z-index:1000;
  overflow:auto;
}

/* ===== CONTACT ===== */
.contact-box a{
  display:block;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  text-decoration:none;
  color:white;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(56,189,248,0.2);

  transition:0.2s;
}

.contact-box a:hover{
  background:rgba(56,189,248,0.25);
  transform:scale(1.05);
}
</style>
</head>

<body>

<div id="hud">Score: 0</div>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h2>GAME SNAKE ERYK</h2>
    <input id="user" placeholder="Tên tài khoản">
    <button onclick="login()">Vào game</button>
  </div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="menu-box">
    <h1>🐍 Snake Eryk</h1>
    <p>Pro Max Edition</p>

    <button onclick="start()">▶ Bắt đầu</button>
    <button onclick="openTop()">🏆 Bảng xếp hạng</button>
    <button onclick="openContact()">📱 Contact</button>
  </div>
</div>

<canvas id="c"></canvas>

<!-- GAME OVER -->
<div class="over" id="over">
  <div class="menu-box">
    <h1>GAME OVER</h1>
    <p id="scoreText"></p>

    <button onclick="restart()">🔄 Chơi lại</button>
    <button onclick="backMenu()">🏠 Menu</button>
  </div>
</div>

<!-- TOP -->
<div class="top" id="top">
  <div class="menu-box">
    <h2>🏆 Leaderboard</h2>
    <div id="list"></div>
    <button onclick="closeTop()">Đóng</button>
  </div>
</div>

<!-- CONTACT -->
<div class="top" id="contact">
  <div class="menu-box">
    <h2>📱 Contact</h2>

    <div class="contact-box">
      <a href="https://x.com/Erykle1blp" target="_blank">🐦 Twitter / X</a>
      <a href="https://www.facebook.com/anggkhoi.806438?locale=vi_VN" target="_blank">📘 Facebook</a>
      <a href="https://www.tiktok.com" target="_blank">🎵 TikTok</a>
    </div>

    <button onclick="closeContact()">Đóng</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  query,
  limitToLast
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyADmCQlryrBmQIuzQopZ5LCURO7RaguyuM",
  databaseURL: "https://mcwdlk-default-rtdb.firebaseio.com",
  projectId: "mcwdlk"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let player="",score=0;

/* LOGIN */
window.login=function(){
  player=document.getElementById("user").value||"Guest";
  document.getElementById("login").style.display="none";
  document.getElementById("menu").style.display="flex";
};

/* MENU */
window.start=function(){
  document.getElementById("menu").style.display="none";
  document.getElementById("c").style.display="block";
  init();
};

window.backMenu=function(){
  document.getElementById("over").style.display="none";
  document.getElementById("c").style.display="none";
  document.getElementById("menu").style.display="flex";
};

/* CONTACT */
window.openContact=()=>document.getElementById("contact").style.display="block";
window.closeContact=()=>document.getElementById("contact").style.display="none";

/* TOP */
window.openTop=function(){
  document.getElementById("top").style.display="block";

  const q=query(ref(db,"scores"),limitToLast(100));

  onValue(q,(snap)=>{
    let data=[];
    snap.forEach(c=>data.push(c.val()));
    data.sort((a,b)=>b.score-a.score);

    document.getElementById("list").innerHTML=
      data.map((d,i)=>
        `<div style="display:flex;justify-content:space-between;padding:10px;margin:5px 0;background:#111;border-radius:10px">
          <div>#${i+1} ${d.user}</div>
          <div style="color:#00ff88">${d.score}</div>
        </div>`
      ).join("");
  });
};

window.closeTop=()=>document.getElementById("top").style.display="none";

/* GAME */
let ctx,snake,dir,food,loop,c;

function resize(){
  c=document.getElementById("c");
  c.width=innerWidth;
  c.height=innerHeight;
}
window.addEventListener("resize",resize);

function init(){
  resize();
  ctx=c.getContext("2d");

  snake=[{x:10,y:10}];
  dir={x:1,y:0};
  score=0;
  food=random();

  document.onkeydown=(e)=>{
    if(e.key=="ArrowUp"&&dir.y!=1)dir={x:0,y:-1};
    if(e.key=="ArrowDown"&&dir.y!=-1)dir={x:0,y:1};
    if(e.key=="ArrowLeft"&&dir.x!=1)dir={x:-1,y:0};
    if(e.key=="ArrowRight"&&dir.x!=-1)dir={x:1,y:0};
  };

  loop=setInterval(draw,90);
}

function random(){
  return {
    x:Math.floor(Math.random()*(c.width/20)),
    y:Math.floor(Math.random()*(c.height/20))
  };
}

function draw(){
  document.getElementById("hud").innerText="Score: "+score;

  let maxX=Math.floor(c.width/20);
  let maxY=Math.floor(c.height/20);

  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  if(head.x<0||head.y<0||head.x>=maxX||head.y>=maxY) return end();

  for(let s of snake){
    if(s.x==head.x&&s.y==head.y) return end();
  }

  snake.unshift(head);

  if(head.x==food.x&&head.y==food.y){
    score+=10;
    food=random();
  }else snake.pop();

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.strokeStyle="#38bdf8";
  ctx.strokeRect(0,0,c.width,c.height);

  ctx.fillStyle="red";
  ctx.fillRect(food.x*20,food.y*20,20,20);

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,20,20));
}

function end(){
  clearInterval(loop);
  document.getElementById("c").style.display="none";
  document.getElementById("over").style.display="flex";
  document.getElementById("scoreText").innerText="Score: "+score;

  push(ref(db,"scores"),{
    user:player,
    score:score,
    time:Date.now()
  });
}

window.restart=function(){
  document.getElementById("over").style.display="none";
  document.getElementById("c").style.display="block";
  init();
};
</script>

</body>
</html>
